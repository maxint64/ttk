<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ttk - 担当君</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <header class="topbar">
          <div>
            <p class="eyebrow">TannTouKunn</p>
            <h1 id="app-title">ttk</h1>
          </div>
          <p class="summary" id="summaryText">アクティビティ 0件</p>
        </header>

        <form class="create-form" id="activityForm">
          <label for="activityName">アクティビティ名</label>
          <div class="input-row">
            <input id="activityName" name="activityName" type="text" placeholder="例: 朝会、掃除当番、勉強会" autocomplete="off" maxlength="144" required>
            <button type="submit">追加</button>
          </div>
        </form>
        <p class="error-message" id="errorMessage" role="alert" hidden></p>
        <div class="update-notice" id="updateNotice" role="status" aria-live="polite" hidden>
          <span>担当情報が更新されています。入力中の内容を確認してから最新情報を表示してください。</span>
          <button type="button" id="updateNoticeButton">最新情報を表示</button>
        </div>

        <section class="activity-list" id="activityList" aria-label="アクティビティ一覧"></section>
      </section>
    </main>

    <template id="activityTemplate">
      <article class="activity-card">
        <div class="activity-header">
          <div>
            <h2 class="activity-title"></h2>
            <p class="activity-meta"></p>
          </div>
          <button class="icon-button danger activity-delete" type="button" aria-label="アクティビティを削除">削除</button>
        </div>

        <section class="assignment-panel" aria-label="今日の担当表">
          <div class="date-controls">
            <span class="date-controls-label">日付選択</span>
            <button class="date-previous" type="button">前日</button>
            <button class="date-today" type="button">今日</button>
            <button class="date-next" type="button">翌日</button>
            <input class="assignment-date-input" type="date" aria-label="担当日">
          </div>
          <div class="assignment-table-wrap"></div>
          <p class="assignment-empty">役割とメンバーを追加すると表が表示されます。</p>
        </section>

        <div class="setup-panels">
          <section class="panel">
            <div class="panel-title">
              <h3>役割</h3>
              <span class="count role-count">0</span>
            </div>
            <form class="mini-form role-form">
              <input type="text" name="roleName" placeholder="例: 司会、記録、発表" autocomplete="off" maxlength="144" required>
              <button type="submit">追加</button>
            </form>
            <ul class="chip-list role-list"></ul>
          </section>

          <section class="panel">
            <div class="panel-title">
              <h3>メンバー</h3>
              <span class="count member-count">0</span>
            </div>
            <form class="mini-form member-form">
              <input type="text" name="memberName" placeholder="例: 田中、佐藤、山田" autocomplete="off" maxlength="144" required>
              <input type="email" name="memberEmail" placeholder="例: tanaka@example.com" autocomplete="email" maxlength="144" required>
              <button type="submit">追加</button>
            </form>
            <ul class="chip-list member-list"></ul>
          </section>
        </div>
      </article>
    </template>

    <script type="module" src="app.js"></script>
  </body>
</html>
