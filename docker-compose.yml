services:
  ttk:
    build: .
    ports:
      - "8000:8000"
    environment:
      TTK_HOST: 0.0.0.0
      TTK_PORT: 8000
      TTK_DB_PATH: /app/data/ttk.sqlite3
    volumes:
      - ttk-data:/app/data
    restart: unless-stopped
  ttk-rotation:
    build: .
    command: ["uv", "run", "python", "run_rotation.py"]
    environment:
      TTK_DB_PATH: /app/data/ttk.sqlite3
    volumes:
      - ttk-data:/app/data
    restart: unless-stopped

volumes:
  ttk-data:
